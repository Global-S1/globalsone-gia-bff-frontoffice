services:
  bff-frontoffice-gia:
    container_name: bff-frontoffice-gia
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - STAGE=${STAGE:-PROD}
      - APP_NAME=${APP_NAME:-bff-frontoffice-gia}
      - APP_PORT=${APP_PORT:-3100}
      - APP_DEFAULT_LANG=${APP_DEFAULT_LANG:-es}
      - REDIS_HOST=${REDIS_HOST:-redis-global-gia}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - BFF_CACHE_ENABLED=${BFF_CACHE_ENABLED:-true}
      - BFF_CACHE_DEFAULT_TTL=${BFF_CACHE_DEFAULT_TTL:-300}
      - MS_AUTH_URL=${MS_AUTH_URL:-http://ms-auth-gia:3020}
      - MS_AGENTS_URL=${MS_AGENTS_URL:-http://ms-agents-gia:3040}
      - MS_DOCUMENTS_URL=${MS_DOCUMENTS_URL:-http://ms-documents-gia:3050}
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  coolify:
    external: true
